<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - Campus Smart Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">H</span>
        Campus Smart Hub
      </a>
      <button class="nav-toggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="index.html" class="nav-link">홈</a>
        <a href="notices.html" class="nav-link active">공지사항</a>
        <a href="calendar.html" class="nav-link">캘린더</a>
        <a href="timetable.html" class="nav-link">시간표</a>
        <a href="shuttle.html" class="nav-link">셔틀버스</a>
        <a href="ask.html" class="nav-link">질문하기</a>
        <a href="bookmarks.html" class="nav-link">북마크</a>
      </div>
      <div class="nav-right">
        <button class="btn btn-sm btn-primary" id="enableNotifBtn" title="새 공지 알림">🔔 알림 받기</button>
        <button class="theme-toggle" id="themeToggle" title="다크 모드">🌙</button>
      </div>
    </div>
  </nav>

  <main class="container">

    <div class="page-header">
      <h1>공지사항</h1>
      <p>학교 공지를 확인하고, 중요한 공지를 북마크하거나 캘린더에 추가하세요.</p>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="noticeSearch" placeholder="공지 검색...">
      <button class="filter-btn active" data-category="전체">전체</button>
      <button class="filter-btn" data-category="학사">학사</button>
      <button class="filter-btn" data-category="일반">일반</button>
      <button class="filter-btn" data-category="장학">장학</button>
      <button class="filter-btn" data-category="혁신">혁신</button>
      <span id="resultCount" style="font-size:0.85rem;color:var(--color-text-muted);margin-left:auto;white-space:nowrap;"></span>
    </div>

    <div class="notice-grid" id="noticeGrid"></div>

  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Campus Smart Hub v2. 한신대학교 캠퍼스 생활 도우미.</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/notices.js"></script>

</body>
</html>
